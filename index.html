<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bully Crypto</title>

<style>
body {
  margin:0;
  background:#050606;
  color:#fff;
  font-family:-apple-system, BlinkMacSystemFont, Arial;
}

.app {
  max-width:520px;
  margin:auto;
}

/* HEADER */
.header {
  padding:18px;
  display:flex;
  align-items:center;
  gap:12px;
  border-bottom:1px solid #1f1f1f;
}

.logo {
  width:44px;
  height:44px;
  border-radius:12px;
}

.title {
  font-size:18px;
  font-weight:800;
}

.sub {
  color:#888;
  font-size:12px;
}

/* INPUT */
input {
  width:100%;
  padding:14px;
  border:none;
  border-bottom:1px solid #1f1f1f;
  background:#050606;
  color:white;
  font-size:16px;
}

/* COINS */
.quick {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:12px;
}

.quick button {
  flex:1 1 28%;
  padding:10px;
  border-radius:8px;
  border:1px solid #222;
  background:#101010;
  color:white;
  font-weight:700;
}

/* TABS */
.tabs {
  display:flex;
  border-bottom:1px solid #1f1f1f;
}

.tab {
  flex:1;
  text-align:center;
  padding:12px;
  color:#777;
}

.tab.active {
  color:#7cff55;
  border-bottom:2px solid #7cff55;
}

/* SCREEN */
.screen {
  display:none;
  padding:16px;
}

.screen.active {
  display:block;
}

/* CARDS */
.card {
  background:#101010;
  border:1px solid #1f1f1f;
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
}

.big {
  font-size:32px;
  font-weight:800;
}

.small {
  color:#999;
}

/* DECISION */
.decision {
  font-size:42px;
  font-weight:900;
}

.buy { color:#7cff55; }
.sell { color:#ff4d5d; }
.hold { color:#ffd60a; }

iframe {
  border-radius:12px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
  <!-- 🔥 LOGO FIXED HERE -->
  <img src="logo.PNG" class="logo">
  <div>
    <div class="title">BULLY</div>
    <div class="sub">CRYPTO</div>
  </div>
</div>

<input id="ticker" placeholder="BTC, ETH, SOL">

<div class="quick">
  <button onclick="selectCoin('BTC')">BTC</button>
  <button onclick="selectCoin('ETH')">ETH</button>
  <button onclick="selectCoin('SOL')">SOL</button>
  <button onclick="selectCoin('XRP')">XRP</button>
  <button onclick="selectCoin('ZEC')">ZEC</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">Overview</div>
  <div class="tab" onclick="switchTab(1); loadChart()">Chart</div>
  <div class="tab" onclick="switchTab(2)">Decision</div>
</div>

<div class="screen active">
  <div class="card">
    <div class="big" id="price">—</div>
    <div class="small" id="move">—</div>
  </div>
</div>

<div class="screen">
  <div id="chart"></div>
</div>

<div class="screen">
  <div class="card">
    <div id="decision" class="decision">WAIT</div>
    <div class="small" id="reason"></div>
  </div>
</div>

</div>

<script>

let currentSymbol = ""
let chartLoaded = ""

const screens = document.querySelectorAll(".screen")
const tabs = document.querySelectorAll(".tab")

function switchTab(i){
  screens.forEach(s => s.classList.remove("active"))
  tabs.forEach(t => t.classList.remove("active"))
  screens[i].classList.add("active")
  tabs[i].classList.add("active")
}

function selectCoin(sym){
  document.getElementById("ticker").value = sym
  currentSymbol = ""
  run()
}

// debounce
let timeout
document.getElementById("ticker").addEventListener("input", () => {
  clearTimeout(timeout)
  timeout = setTimeout(run, 300)
})

const idMap = {
  BTC:"bitcoin",
  ETH:"ethereum",
  SOL:"solana",
  XRP:"ripple",
  ZEC:"zcash"
}

async function run(){
  const sym = ticker.value.toUpperCase()
  if(!sym || sym === currentSymbol) return
  currentSymbol = sym

  const id = idMap[sym]
  if(!id) return

  const data = await fetch(
    `https://api.coingecko.com/api/v3/simple/price?ids=${id}&vs_currencies=usd&include_24hr_change=true`
  ).then(r=>r.json())

  const price = data[id].usd
  const move = data[id].usd_24h_change

  document.getElementById("price").textContent = "$" + price.toFixed(2)
  document.getElementById("move").textContent = move.toFixed(2) + "%"

  let decision="HOLD"
  let reason="No strong setup"

  if(move > 1){
    decision="BUY"
    reason="Momentum up"
  }
  else if(move < -1){
    decision="SELL"
    reason="Momentum down"
  }

  const el = document.getElementById("decision")
  el.textContent = decision
  el.className = "decision " +
    (decision==="BUY"?"buy":decision==="SELL"?"sell":"hold")

  document.getElementById("reason").textContent = reason
}

function loadChart(){
  if(chartLoaded === currentSymbol) return
  chartLoaded = currentSymbol

  document.getElementById("chart").innerHTML = `
  <iframe
    width="100%"
    height="400"
    src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:${currentSymbol}USDT&theme=dark"
    frameborder="0">
  </iframe>`
}

</script>

</body>
</html>
